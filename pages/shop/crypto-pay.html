<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta name="nt-crypto-checkout-url" content="https://nutrithrive-crypto-checkout.onrender.com">
  <title>Crypto checkout | NutriThrive</title>
  <link rel="icon" type="image/png" href="/assets/images/logo/LOGO.webp">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8f5ec;
      color: #1a2e22;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .box { max-width: 420px; }
    h1 { font-size: 1.25rem; color: #2d5a3d; }
    p { color: #5f6d63; }
    a { color: #2d5a3d; font-weight: 600; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Opening crypto checkout…</h1>
    <p id="status">Loading your cart.</p>
    <p><a href="/cart">Back to cart</a></p>
  </div>
  <script src="/scripts/global/cart.js"></script>
  <script src="/scripts/global/crypto-checkout.js"></script>
  <script>
    (function () {
      const status = document.getElementById('status');
      const cart = window.Cart && window.Cart.get && window.Cart.get();
      if (!cart || !cart.items || !cart.items.length) {
        status.textContent = 'Your cart is empty.';
        return;
      }
      const url = window.NutriThriveCryptoCheckout.buildCheckoutUrl(cart);
      if (!url) {
        status.textContent = 'Could not start crypto checkout.';
        return;
      }
      status.textContent = 'Redirecting…';
      window.location.replace(url);
    })();
  </script>
</body>
</html>

<script>
        function getCart() {
            return window.Cart && window.Cart.get ? window.Cart.get() : { items: [] };
        }

        function money(n) {
            return `$${Number(n || 0).toFixed(2)}`;
        }

        function computeSubtotal(items) {
            return Number((items || []).reduce((sum, item) => {
                const qty = Number.parseInt(item.quantity || 1, 10);
                const price = Number.parseFloat(item.price);
                if (!Number.isFinite(qty) || qty <= 0) return sum;
                if (!Number.isFinite(price) || price < 0) return sum;
                return sum + (qty * price);
            }, 0).toFixed(2));
        }

        function populateCountryDropdown() {
            const select = document.getElementById('shipping-country');
            if (!select || !window.ShippingRates || !window.ShippingRates.getCountryList) return;
            const countries = window.ShippingRates.getCountryList();
            select.innerHTML = '';
            countries.forEach(country => {
                const option = document.createElement('option');
                option.value = country.code;
                option.textContent = country.name;
                select.appendChild(option);
            });
            const saved = localStorage.getItem('nutrithrive_shipping_country');
            if (saved) {
                select.value = saved;
            } else if ([...select.options].some(option => option.value === 'AU')) {
                select.value = 'AU';
                localStorage.setItem('nutrithrive_shipping_country', 'AU');
            }
        }

        function renderOrderReview() {
            const cart = getCart();
            const wrap = document.getElementById('order-items');
            if (!cart.items || cart.items.length === 0) {
                wrap.innerHTML = '<p class="muted">Your cart is empty. <a href="/products/">Browse products</a>.</p>';
                document.getElementById('subtotal').textContent = '$0.00';
                document.getElementById('total').textContent = '$0.00';
                return;
            }

            wrap.replaceChildren();
            cart.items.forEach(item => {
                const row = document.createElement('div');
                row.className = 'order-item';
                const left = document.createElement('div');
                const name = document.createElement('div');
                name.className = 'order-item-name';
                name.textContent = String(item.name || '').slice(0, 120);
                const qty = document.createElement('div');
                qty.className = 'muted';
                qty.textContent = 'Qty: ' + parseInt(item.quantity || 1, 10);
                left.appendChild(name);
                left.appendChild(qty);
                const right = document.createElement('div');
                right.textContent = money((parseFloat(item.price) || 0) * (parseInt(item.quantity || 1, 10) || 1));
                row.appendChild(left);
                row.appendChild(right);
                wrap.appendChild(row);
            });

            const subtotal = computeSubtotal(cart.items);
            document.getElementById('subtotal').textContent = money(subtotal);
        }

        function updateShippingAndTotal() {
            const cart = getCart();
            const country = document.getElementById('shipping-country').value;
            if (country) localStorage.setItem('nutrithrive_shipping_country', country);
            const subtotal = computeSubtotal(cart.items);
            const shipping = country && window.ShippingRates ? window.ShippingRates.calculate(country, cart.items, subtotal) : null;
            const shippingValue = shipping === null ? null : Number.parseFloat(shipping) || 0;
            document.getElementById('shipping').textContent = shippingValue === null ? 'Select country' : (shippingValue === 0 ? 'Free' : money(shippingValue));
            document.getElementById('total').textContent = money(subtotal + (shippingValue || 0));
            initPayPal();
            setupApplePay();
        }

        function initPayPal() {
            const container = document.getElementById('paypal-button-container');
            const cardContainer = document.getElementById('paypal-card-container');
            if (!container || typeof paypal === 'undefined') return;
            container.innerHTML = '';
            if (cardContainer) cardContainer.innerHTML = '';
            const setPlaceholder = function(message) {
                container.replaceChildren();
                const p = document.createElement('p');
                p.className = 'payment-placeholder';
                p.textContent = message;
                container.appendChild(p);
            };
            const showCheckoutError = function(err) {
                const message = err && err.message ? err.message : 'Unable to load payment options right now.';
                console.error('Checkout initialization error:', err);
                setPlaceholder(message);
            };

            const cart = getCart();
            if (!cart.items || cart.items.length === 0) {
                setPlaceholder('Your cart is empty.');
                return;
            }

            const countryCode = document.getElementById('shipping-country').value;
            if (!countryCode) {
                setPlaceholder('Select shipping country to continue.');
                return;
            }

            let captureToken = null;
            const config = {
                createOrder: function () {
                    return fetch('/.netlify/functions/paypal-create-order', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            items: cart.items.map(item => ({ id: item.id, quantity: parseInt(item.quantity || 1, 10) })),
                            countryCode: countryCode
                        })
                    }).then(res => res.json().then(data => ({ ok: res.ok, data })))
                    .then(result => {
                        if (!result.ok) throw new Error(result.data.error || 'Failed to create order');
                        captureToken = result.data.captureToken;
                        return result.data.orderID || result.data.id;
                    });
                },
                onApprove: function (data) {
                    return fetch('/.netlify/functions/paypal-capture-order', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ orderID: data.orderID || data.id, captureToken: captureToken })
                    }).then(res => res.json().then(payload => ({ ok: res.ok, payload })))
                    .then(result => {
                        if (!result.ok) throw new Error(result.payload.error || 'Payment failed');
                        window.Cart.clear();
                        window.location.href = '/thank-you.html?orderId=' + (data.orderID || data.id);
                    }).catch(err => alert('Payment error: ' + err.message));
                },
                onError: function (err) {
                    alert('Payment error: ' + (err.message || 'Unknown error'));
                }
            };

            paypal.Buttons(Object.assign({ fundingSource: paypal.FUNDING.PAYPAL }, config))
                .render('#paypal-button-container')
                .catch(showCheckoutError);
            paypal.Buttons(Object.assign({ fundingSource: paypal.FUNDING.CARD }, config))
                .render('#paypal-card-container')
                .catch(showCheckoutError);
        }

        function setupApplePay() {
            const wrapper = document.getElementById('applepay-wrapper');
            const target = document.getElementById('applepay-container');
            if (wrapper) wrapper.style.display = 'none';
            if (target) target.innerHTML = '<p class="payment-placeholder">Apple Pay is temporarily unavailable.</p>';
        }

        function bootCheckout() {
            populateCountryDropdown();
            renderOrderReview();
            updateShippingAndTotal();
        }
        if (typeof window.ntLoadPayPalSdk !== 'function') {
            console.error('PayPal SDK loader is missing (paypal-sdk-loader.js).');
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', bootCheckout);
            } else {
                bootCheckout();
            }
        } else {
            const p = window.ntLoadPayPalSdk({ currency: 'AUD', components: 'buttons,applepay,funding-eligibility' });
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', function () {
                    p.then(bootCheckout).catch(function (err) {
                        console.error('PayPal SDK failed to load:', err);
                        bootCheckout();
                    });
                });
            } else {
                p.then(bootCheckout).catch(function (err) {
                    console.error('PayPal SDK failed to load:', err);
                    bootCheckout();
                });
            }
        }

    </script>

# Builds the site and deploys it to Netlify production on every push to main.
# Requires two repository secrets (Settings → Secrets and variables → Actions):
#   NETLIFY_AUTH_TOKEN  — Netlify user access token (User settings → Applications → New access token)
#   NETLIFY_SITE_ID     — Site API ID (Netlify → Site configuration → General → Site information → API ID)
name: Deploy to Netlify

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: netlify-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm ci
      - name: Build assets
        run: npm run build
      - name: Deploy to Netlify (production)
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          # Build outputs are written in place; node_modules is not part of the static site.
          rm -rf node_modules .build
          npx --yes netlify-cli@17 deploy --dir=. --prod --message "GH Actions: ${{ github.sha }}"

# Ensures the sitemap generator runs cleanly on each push/PR.
# If sitemap.xml drifts, run from repo root: node scripts/build-sitemap.js
name: Sitemap
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Opt into Node 24 for actions using JS (checkout/setup-node) per GitHub Actions deprecation timeline.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so `git log -- <file>` lastmod matches local builds (shallow clones break per-file dates).
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Regenerate sitemap
        run: node scripts/build-sitemap.js
      - name: Fail if sitemap.xml not committed
        run: |
          if ! git diff --quiet -- sitemap.xml; then
            echo "::error::sitemap.xml is out of date. Run: node scripts/build-sitemap.js"
            git diff -- sitemap.xml
            exit 1
          fi

# Ensures sitemap.xml lists the same URLs as scripts/build-sitemap.cjs (ignores lastmod date drift).
name: Sitemap

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: sitemap-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          repository: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Verify sitemap URL list matches generator
        env:
          TZ: Australia/Melbourne
        run: node scripts/verify-sitemap-locs.mjs

# Runs on GitHub's servers while your laptop is off.
# Add repo secrets (Settings → Secrets and variables → Actions):
#   POKIFINDER_WATCH_URLS           e.g. https://a.com/cat,https://b.com/search?q=pokemon
#   POKIFINDER_TELEGRAM_BOT_TOKEN   from @BotFather
#   POKIFINDER_TELEGRAM_CHAT_ID     numeric chat id (e.g. @userinfobot)
# Optional:
#   POKIFINDER_DISCORD_WEBHOOK_URL

name: Pokifinder remote monitor

on:
  schedule:
    - cron: "42 */4 * * *"
  workflow_dispatch:

concurrency:
  group: pokifinder-remote-notify
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Restore fingerprint state
        uses: actions/cache/restore@v4
        with:
          path: nutrithrive_labs/extension/pokifinder/remote-monitor/.state.json
          key: pokifinder-state-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            pokifinder-state-${{ runner.os }}-

      - name: Run monitor
        env:
          WATCH_URLS: ${{ secrets.POKIFINDER_WATCH_URLS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.POKIFINDER_TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.POKIFINDER_TELEGRAM_CHAT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.POKIFINDER_DISCORD_WEBHOOK_URL }}
        run: node nutrithrive_labs/extension/pokifinder/remote-monitor/run.mjs

      - name: Save fingerprint state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: nutrithrive_labs/extension/pokifinder/remote-monitor/.state.json
          key: pokifinder-state-${{ runner.os }}-${{ github.run_id }}

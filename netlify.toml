[build]
  command = "npm ci && npm run build && node scripts/prepare-netlify-publish.mjs"
  publish = ".netlify-publish"

[[headers]]
  for = "/assets/css/*.min.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/**/*.min.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/**/*.min.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

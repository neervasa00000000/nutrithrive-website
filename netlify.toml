[build]
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  included_files = ["blockchain/src/**", "scripts/global/shipping-rates.js"]

[functions."crypto-monitor"]
  schedule = "*/5 * * * *"

[[redirects]]
  from = "/api/crypto/*"
  to = "/.netlify/functions/crypto-api/api/:splat"
  status = 200
  force = true

<!DOCTYPE html>
<html lang="en-AU">
  <head>
    <link rel="stylesheet" href="/assets/css/design-system.min.css" />
    <script src="/scripts/global/reddit-pixel.min.js"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NutriThrive Labs | Pomodoro Timer</title>
    <meta name="description" content="Free Pomodoro timer with break cycles and daily focus tracking. Runs in your browser." />
    <meta name="robots" content="noindex, follow" />
    <link rel="canonical" href="https://nutrithrive.com.au/nutrithrive_labs/pomodoro-timer.html" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/png" href="/assets/images/logo/LOGO.webp" />
    <meta name="theme-color" content="#f4f8f6" />
    <link rel="stylesheet" href="/styles/nutrithrive-labs-shell.min.css" />
    <style>
      .timer-card {
        text-align: center;
      }
      .timer-card .row {
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <a class="brand" href="/nutrithrive_labs/">
          <img class="mark" src="/assets/images/logo/LOGO.webp" alt="" width="40" height="40" />
          <span>
            <strong>NutriThrive Labs</strong>
            <span>Pomodoro Timer</span>
          </span>
        </a>
        <nav class="nav" aria-label="Tools navigation">
          <a class="chiplink" href="/nutrithrive_labs/">All tools</a>
          <a class="chiplink" href="/">Main site</a>
          <a class="chiplink primary" href="/nutrithrive_labs/pomodoro-timer.html">This tool</a>
        </nav>
      </div>
    </header>

    <main class="wrap">
      <section class="hero">
        <span class="labs-badge">Focus · Breaks</span>
        <h1>Pomodoro Timer</h1>
        <p>Stay focused with work/break cycles and daily focus-minute tracking stored in your browser.</p>
      </section>

      <section class="card timer-card">
        <div class="row">
          <label for="preset"><strong>Preset</strong></label>
          <select id="preset">
            <option value="25-5">25 min work / 5 min break</option>
            <option value="50-10">50 min work / 10 min break</option>
            <option value="15-3">15 min work / 3 min break</option>
          </select>
          <span class="pill" id="phasePill">Work</span>
        </div>
        <div class="clock" id="clock" aria-live="polite">25:00</div>
        <div class="row">
          <button class="primary" id="startBtn" type="button">Start</button>
          <button id="pauseBtn" type="button">Pause</button>
          <button id="resetBtn" type="button">Reset</button>
          <button id="skipBtn" type="button">Skip phase</button>
        </div>
        <p class="muted" id="status" style="margin-top: 0.85rem">Ready.</p>
      </section>

      <section class="card">
        <h2 style="margin: 0 0 0.5rem; font-size: 1rem; text-transform: none; letter-spacing: 0; color: var(--labs-text)">Today</h2>
        <p class="muted" style="margin: 0">Focused minutes: <strong id="todayMinutes">0</strong></p>
      </section>

      <footer class="labs-footer">
        <span><a href="/nutrithrive_labs/">← All tools</a></span>
        <span><a href="/products/">NutriThrive shop</a></span>
      </footer>
    </main>

    <script src="/scripts/pages/labs/pomodoro-timer.min.js"></script>
    <script src="/scripts/pages/labs/labs-shell.min.js" defer></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en-AU">
  <head>
    <link rel="stylesheet" href="/assets/css/design-system.min.css" />
    <script src="/scripts/global/reddit-pixel.min.js"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NutriThrive Labs | Password Generator</title>
    <meta name="description" content="Generate secure random passwords in your browser with copy and strength feedback." />
    <meta name="robots" content="noindex, follow" />
    <link rel="canonical" href="https://nutrithrive.com.au/nutrithrive_labs/password-generator.html" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/png" href="/assets/images/logo/LOGO.webp" />
    <meta name="theme-color" content="#f4f8f6" />
    <link rel="stylesheet" href="/styles/nutrithrive-labs-shell.min.css" />
    <style>
      #output {
        font-family: var(--labs-mono);
        margin-top: 0.85rem;
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <a class="brand" href="/nutrithrive_labs/">
          <img class="mark" src="/assets/images/logo/LOGO.webp" alt="" width="40" height="40" />
          <span>
            <strong>NutriThrive Labs</strong>
            <span>Password Generator</span>
          </span>
        </a>
        <nav class="nav" aria-label="Tools navigation">
          <a class="chiplink" href="/nutrithrive_labs/">All tools</a>
          <a class="chiplink" href="/">Main site</a>
          <a class="chiplink primary" href="/nutrithrive_labs/password-generator.html">This tool</a>
        </nav>
      </div>
    </header>

    <main class="wrap">
      <section class="hero">
        <span class="labs-badge">Secure · Local</span>
        <h1>Password Generator</h1>
        <p>
          Create strong random passwords with custom length and character sets. Generation stays on your device —
          nothing is sent to a server.
        </p>
      </section>

      <section class="card">
        <div class="row">
          <label for="length"><strong>Length</strong></label>
          <input id="length" type="number" min="8" max="64" value="16" style="width: 5rem" />
          <label><input id="upper" type="checkbox" checked /> Uppercase</label>
          <label><input id="lower" type="checkbox" checked /> Lowercase</label>
          <label><input id="nums" type="checkbox" checked /> Numbers</label>
          <label><input id="symbols" type="checkbox" checked /> Symbols</label>
        </div>
        <div class="row" style="margin-top: 0.85rem">
          <button class="primary" id="genBtn" type="button">Generate</button>
          <button id="copyBtn" type="button">Copy</button>
          <span class="pill" id="strength">Strength: —</span>
        </div>
        <input id="output" type="text" readonly value="" aria-label="Generated password" />
      </section>

      <footer class="labs-footer">
        <span><a href="/nutrithrive_labs/">← All tools</a></span>
        <span><a href="/products/">NutriThrive shop</a></span>
      </footer>
    </main>

    <script src="/scripts/pages/labs/password-generator.min.js"></script>
    <script src="/scripts/pages/labs/labs-shell.min.js" defer></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en-AU">
  <head>
    <script src="/scripts/global/reddit-pixel.js"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NutriThrive Labs | Quick Notes</title>
    <meta name="description" content="Quick notes with browser auto-save, copy, and TXT export. Free and local-only." />
    <meta name="robots" content="noindex, follow" />
    <link rel="canonical" href="https://nutrithrive.com.au/nutrithrive_labs/quick-notes.html" />
    <style>
      :root { --bg:#f8fafc; --panel:#fff; --stroke:rgba(15,23,42,.12); --text:#0f172a; --muted:#475569; --accent:#0f6b4d; font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
      *{box-sizing:border-box;} body{margin:0;background:var(--bg);color:var(--text);}
      .wrap{max-width:900px;margin:0 auto;padding:1rem;} .card{background:var(--panel);border:1px solid var(--stroke);border-radius:16px;padding:1rem;margin-top:1rem;}
      .row{display:flex;gap:.6rem;flex-wrap:wrap;align-items:center;} textarea{width:100%;min-height:320px;border-radius:12px;border:1px solid var(--stroke);padding:.8rem;font:600 .95rem/1.5 ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;}
      button{padding:.65rem .8rem;border-radius:12px;border:1px solid var(--stroke);background:#fff;font-weight:700;cursor:pointer;} .primary{background:var(--accent);color:#fff;}
      .muted{color:var(--muted);} a{text-decoration:none;color:inherit;} .pill{display:inline-block;padding:.3rem .55rem;border:1px solid var(--stroke);border-radius:999px;font-size:.82rem;font-weight:700;}
    </style>
    <link rel="stylesheet" href="/styles/nutrithrive-labs-simple.css" />
  </head>
  <body>
    <main class="wrap">
      <div class="row" style="justify-content:space-between;">
        <a href="/nutrithrive_labs/"><strong>NutriThrive</strong></a>
        <a class="pill" href="/nutrithrive_labs/">All tools</a>
      </div>
      <section class="card">
        <h1 style="margin:.2rem 0;">Quick Notes</h1>
        <p class="muted" style="margin:0;">Write fast notes. Auto-saves in your browser and supports copy/download.</p>
      </section>
      <section class="card">
        <textarea id="note" placeholder="Write your notes here..."></textarea>
        <div class="row" style="margin-top:.8rem;">
          <button class="primary" id="copyBtn" type="button">Copy</button>
          <button id="downloadBtn" type="button">Download .txt</button>
          <button id="clearBtn" type="button">Clear</button>
          <span class="muted" id="savedAt">Not saved yet</span>
        </div>
      </section>
    </main>
    <script src="/scripts/pages/labs/quick-notes.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en-AU">
  <head><meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;1,9..144,600&family=IBM+Plex+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <title>NutriThrive Labs | Quick Notes</title>
    <meta name="description" content="Quick notes with browser auto-save, copy, and TXT export. Free and local-only." />
    <meta name="robots" content="noindex, follow" />
    <link rel="canonical" href="https://nutrithrive.com.au/nutrithrive_labs/tools/text/quick-notes/" />
    <link rel="icon" type="image/png" href="/nutrithrive_labs/shared/images/logo.webp" />
    <meta name="theme-color" content="#faf7f2" />
    <link rel="stylesheet" href="/nutrithrive_labs/shared/css/shell.min.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <a class="brand" href="/nutrithrive_labs/">
          <img class="mark" src="/nutrithrive_labs/shared/images/logo.webp" alt="" width="40" height="40" />
          <span>
            <strong>NutriThrive Labs</strong>
            <span>Quick Notes</span>
          </span>
        </a>
        <nav class="nav" aria-label="Tools navigation">
          <a class="chiplink" href="/nutrithrive_labs/">All tools</a>
          <a class="chiplink" href="/">Main site</a>
          <a class="chiplink primary" href="/nutrithrive_labs/tools/text/quick-notes/">This tool</a>
        </nav>
      </div>
    </header>

    <main class="wrap">
      <section class="hero">
        <span class="labs-badge">Auto-save · Local</span>
        <h1>Quick Notes</h1>
        <p>Write fast notes that auto-save in your browser. Copy or download as a .txt file anytime.</p>
      </section>

      <section class="card">
        <textarea id="note" placeholder="Write your notes here…" aria-label="Note content"></textarea>
        <div class="row" style="margin-top: 0.85rem">
          <button class="primary" id="copyBtn" type="button">Copy</button>
          <button id="downloadBtn" type="button">Download .txt</button>
          <button id="clearBtn" type="button">Clear</button>
          <span class="muted" id="savedAt">Not saved yet</span>
        </div>
      </section>

      <footer class="labs-footer">
        <span><a href="/nutrithrive_labs/">← All tools</a></span>
        <span><a href="/products/">NutriThrive shop</a></span>
      </footer>
    </main>

    <script src="quick-notes.min.js"></script>
    <script src="/nutrithrive_labs/shared/js/labs-shell.min.js" defer></script>
  </body>
</html>

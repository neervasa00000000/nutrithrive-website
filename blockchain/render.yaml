# Deploy on Render: https://render.com/docs/infrastructure-as-code
# Connect repo → New Blueprint → point at blockchain/render.yaml
# Set env vars in dashboard (wallets, ETHERSCAN_API_KEY, SMTP, CRYPTO_FEE_PERCENT).

services:
  - type: web
    name: nutrithrive-crypto-checkout
    runtime: node
    rootDir: blockchain
    buildCommand: npm install
    startCommand: npm run start:all
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_DRIVER
        value: sqlite
      - key: SQLITE_PATH
        value: /var/data/orders.db
      - key: PORT
        value: 3000
      - key: CRYPTO_FEE_PERCENT
        value: "3"
    disk:
      name: crypto-orders-db
      mountPath: /var/data
      sizeGB: 1
